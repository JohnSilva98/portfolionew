<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;1,100;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <script src="scripts/scripts.js" defer></script>
    <title>Gerador de senha</title>
  </head>
  <body>
    <div id="register-container">
      <div id="register-banner">
        <div id="banner-layer">
          <h1>Strong Pass</h1>
        </div>
      </div>

      <div class="container">
        <div id="generate-options" class="hide">
          <p>Selecione as opções que você deseja:</p>
          <div class="form-control">
            <label for="lenght">Quantidade de caractereres:</label>
            <input type="text" name="lenght" id="lenght" value="10" />
          </div>
          <div class="form-control">
            <label for="letters">Letras:</label>
            <input type="checkbox" name="letters" id="letters" checked />
          </div>
          <div class="form-control">
            <label for="numbers">Números:</label>
            <input type="checkbox" name="numbers" id="numbers" checked />
          </div>
          <div class="form-control">
            <label for="symbols">Símbolos:</label>
            <input type="checkbox" name="symbols" id="symbols" checked />
          </div>
          <button id="generate-password">Criar senha</button>
          <div id="generated-password">
            <p>Aqui está a sua senha:</p>
            <h4></h4>
            <button id="copy-password">Copiar</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
